# Run from the backend/ directory:
#   alembic upgrade head      → apply all migrations
#   alembic downgrade -1      → roll back one step
#   alembic revision --autogenerate -m "description"  → generate new migration

[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = sqlite:///app/storage/database/database.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S